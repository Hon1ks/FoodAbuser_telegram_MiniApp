<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e1a3a"/>
      <stop offset="100%" stop-color="#08080f"/>
    </radialGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43cea2"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#43cea2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="234" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.25"/>

  <!-- Background glow blob -->
  <ellipse cx="256" cy="240" rx="160" ry="140" fill="#6C63FF" opacity="0.06"/>
  <ellipse cx="200" cy="280" rx="100" ry="80" fill="#43cea2" opacity="0.07"/>

  <!-- ── FORK (left) ── -->
  <g filter="url(#glow)">
    <!-- Tine 1 -->
    <rect x="156" y="128" width="13" height="88" rx="6.5" fill="url(#g1)"/>
    <!-- Tine 2 -->
    <rect x="183" y="128" width="13" height="88" rx="6.5" fill="url(#g1)"/>
    <!-- Tine 3 -->
    <rect x="210" y="128" width="13" height="88" rx="6.5" fill="url(#g1)"/>
    <!-- Fork neck -->
    <path d="M162 208 Q182 228 182 248 L182 372 Q182 384 176 384 Q162 384 162 372 L162 248 Q162 228 182 208 Z" fill="url(#g1)"/>
    <path d="M223 208 Q203 228 203 248 L203 372 Q203 384 209 384 Q223 384 223 372 L223 248 Q223 228 203 208 Z" fill="url(#g1)"/>
    <rect x="162" y="360" width="61" height="24" rx="12" fill="url(#g1)"/>
  </g>

  <!-- ── DIVIDER ── -->
  <rect x="254" y="140" width="3" height="240" rx="1.5" fill="rgba(255,255,255,0.08)"/>

  <!-- ── CHART (right) ── -->
  <g filter="url(#glow)">
    <!-- Chart line -->
    <polyline
      points="284,352  314,272  344,308  374,196  410,236"
      fill="none"
      stroke="url(#g2)"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Chart dots -->
    <circle cx="284" cy="352" r="11" fill="#43cea2"/>
    <circle cx="314" cy="272" r="11" fill="#6C63FF"/>
    <circle cx="344" cy="308" r="11" fill="#43cea2"/>
    <circle cx="374" cy="196" r="11" fill="#6C63FF"/>
    <circle cx="410" cy="236" r="11" fill="#43cea2"/>
    <!-- Inner dot highlights -->
    <circle cx="284" cy="352" r="5" fill="white" opacity="0.6"/>
    <circle cx="314" cy="272" r="5" fill="white" opacity="0.6"/>
    <circle cx="344" cy="308" r="5" fill="white" opacity="0.6"/>
    <circle cx="374" cy="196" r="5" fill="white" opacity="0.6"/>
    <circle cx="410" cy="236" r="5" fill="white" opacity="0.6"/>
  </g>

  <!-- ── Bottom label "FA" subtle ── -->
  <text x="256" y="466" text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="800" letter-spacing="8"
    fill="url(#g1)" opacity="0.45">FOOD ABUSER</text>
</svg>
